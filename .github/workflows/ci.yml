name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Install dependencies
        run: sudo apt-get update || true && sudo apt-get install -y git

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changes
        id: filter
        run: |
          set -e
          git config --global --add safe.directory "*"
          # Ensure we have the base branch for comparison
          git fetch origin ${{ github.base_ref || 'main' }}

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Compare against the base branch
            DIFF=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          else
            # Push event: compare against previous commit
            DIFF=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Changed files:"
          echo "$DIFF"

          SRC_CHANGED="false"
          while IFS= read -r file; do
            if [[ -z "$file" ]]; then continue; fi
            # Ignore markdown, txt, docs, license
            if [[ "$file" == *.md ]] || [[ "$file" == *.txt ]] || [[ "$file" == docs/* ]] || [[ "$file" == LICENSE ]]; then
              continue
            fi
            # Found a source file
            SRC_CHANGED="true"
            break
          done <<< "$DIFF"

          echo "src=$SRC_CHANGED" >> $GITHUB_OUTPUT

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Aggressive)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /var/lib/docker/overlay2/* # Be careful, but we prune later anyway
          sudo docker system prune -af --volumes || true

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      # Cache Tools (protoc, helm, etc.)
      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-${{ hashFiles('Makefile', 'server/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-

      # Cache Lint (golangci-lint, pre-commit)
      - name: Cache Lint
        uses: actions/cache@v4
        with:
          path: build/.cache
          key: ${{ runner.os }}-lint-cache-${{ hashFiles('server/go.sum', 'server/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-lint-cache-

      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y make xz-utils curl unzip git ca-certificates gzip tar
          sudo apt-get clean

      - name: Prepare environment
        run: make prepare

      - name: Lint
        run: make lint

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    if: ${{ needs.changes.outputs.src == 'true' }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Aggressive)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo docker system prune -af --volumes || true

      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y make xz-utils curl unzip git ca-certificates gzip tar
          sudo apt-get clean

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Docker Cache
        uses: actions/cache@v4
        with:
          path: build/buildx-cache
          key: ${{ runner.os }}-buildx-${{ steps.get-date.outputs.week }}-${{ hashFiles('tests/integration/examples/Dockerfile.timeserver', 'tests/integration/examples/timeserver_patch/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ steps.get-date.outputs.week }}-${{ hashFiles('tests/integration/examples/Dockerfile.timeserver', 'tests/integration/examples/timeserver_patch/**') }}-
            ${{ runner.os }}-buildx-${{ steps.get-date.outputs.week }}-

      - name: Cache Docker images
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: docker-images-${{ runner.os }}-${{ steps.get-date.outputs.week }}

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-

      - name: Prepare environment
        run: make prepare CACHE_TO=type=local,dest=build/buildx-cache CACHE_FROM=type=local,src=build/buildx-cache

      - name: Test (Short)
        run: |
          go test -count=1 -timeout 600s -cover -coverprofile=coverage-fast.out $(go list ./... | grep -v /tests/e2e | grep -v /tests/integration | grep -v /tests/public_api)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-fast.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  # ==========================================
  # BUILD JOBS (Split to avoid disk pressure)
  # ==========================================

  build-server-images:
    name: Build Server & Core Images
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Aggressive)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af --volumes || true
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y make xz-utils curl unzip git ca-certificates gzip tar
      - name: Generate Protobufs
        run: make gen

      - name: Build Server
        run: |
          make -C server build-docker PLATFORMS=linux/amd64 CACHE_TO=type=gha,mode=max,scope=server-amd64 CACHE_FROM=type=gha,scope=server-amd64
          docker save mcpany/server:latest | gzip > server.tar.gz
      - name: Upload Server
        uses: actions/upload-artifact@v4
        with:
          name: image-server-amd64
          path: server.tar.gz
          retention-days: 1

      - name: Build Everything
        run: |
          docker system prune -f
          make -C server build-everything-docker PLATFORMS=linux/amd64 CACHE_TO=type=gha,mode=max,scope=everything-amd64 CACHE_FROM=type=gha,scope=everything-amd64
          docker save mcpany/everything:latest | gzip > everything.tar.gz
      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: image-everything-amd64
          path: everything.tar.gz
          retention-days: 1

      - name: Build Operator
        run: |
          docker system prune -f
          make -C server docker-build-operator PLATFORMS=linux/amd64 CACHE_TO=type=gha,mode=max,scope=operator-amd64 CACHE_FROM=type=gha,scope=operator-amd64
          docker save mcpany/operator:latest | gzip > operator.tar.gz
      - name: Upload Operator
        uses: actions/upload-artifact@v4
        with:
          name: image-operator-amd64
          path: operator.tar.gz
          retention-days: 1

  build-test-images:
    name: Build Test & Mock Images
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Aggressive)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af --volumes || true
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y make xz-utils curl unzip git ca-certificates gzip tar
      - name: Generate Protobufs
        run: make gen

      - name: Build HTTP Echo
        run: |
          make -C server build-http-echo-docker PLATFORMS=linux/amd64 CACHE_TO=type=gha,mode=max,scope=http-echo-amd64 CACHE_FROM=type=gha,scope=http-echo-amd64
          docker save mcpany/http-echo-server:latest | gzip > http-echo.tar.gz
      - name: Upload HTTP Echo
        uses: actions/upload-artifact@v4
        with:
          name: image-http-echo-amd64
          path: http-echo.tar.gz
          retention-days: 1

      - name: Build Time Server
        run: |
          docker system prune -f
          make -C server build-e2e-timeserver-docker PLATFORMS=linux/amd64 CACHE_TO=type=gha,mode=max,scope=time-server-amd64 CACHE_FROM=type=gha,scope=time-server-amd64
          docker save mcpany-e2e-time-server | gzip > time-server.tar.gz
      - name: Upload Time Server
        uses: actions/upload-artifact@v4
        with:
          name: image-time-server-amd64
          path: time-server.tar.gz
          retention-days: 1

      - name: Build Cowsay
        run: |
          docker system prune -f
          make -C server build-cowsay-docker PLATFORMS=linux/amd64 CACHE_TO=type=gha,mode=max,scope=cowsay-amd64 CACHE_FROM=type=gha,scope=cowsay-amd64
          docker save mcpany/e2e-cowsay-server:latest | gzip > cowsay.tar.gz
      - name: Upload Cowsay
        uses: actions/upload-artifact@v4
        with:
          name: image-cowsay-amd64
          path: cowsay.tar.gz
          retention-days: 1

  build-ui-images:
    name: Build UI Images
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Aggressive)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af --volumes || true
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y make xz-utils curl unzip git ca-certificates gzip tar
      - name: Generate Protobufs
        run: make gen

      - name: Build UI
        run: |
          make -C server docker-build-ui PLATFORMS=linux/amd64 CACHE_TO=type=gha,mode=max,scope=ui-amd64 CACHE_FROM=type=gha,scope=ui-amd64
          docker save mcpany/ui:latest | gzip > ui.tar.gz
      - name: Upload UI
        uses: actions/upload-artifact@v4
        with:
          name: image-ui-amd64
          path: ui.tar.gz
          retention-days: 1

      - name: Build UI Test
        run: |
          docker system prune -f
          make -C ui build-test-docker PLATFORMS=linux/amd64 CACHE_TO=type=gha,mode=max,scope=ui-test-amd64 CACHE_FROM=type=gha,scope=ui-test-amd64
          docker save mcpany-ui-e2e:latest | gzip > ui-test-image.tar.gz
      - name: Upload UI Test
        uses: actions/upload-artifact@v4
        with:
          name: image-ui-test-amd64
          path: ui-test-image.tar.gz
          retention-days: 1

  # ==========================================
  # DOWNSTREAM JOBS
  # ==========================================

  e2e-sequential:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Wait for all build jobs
    needs: [build-server-images, build-test-images]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    if: ${{ needs.changes.outputs.src == 'true' }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af --volumes || true

      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y make xz-utils curl unzip git ca-certificates gzip tar
          sudo apt-get clean

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      # Explicit Downloads with Distinct Paths
      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-amd64
          path: downloads/server

      - name: Download HTTP Echo
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-amd64
          path: downloads/http-echo

      - name: Download Time Server
        uses: actions/download-artifact@v4
        with:
          name: image-time-server-amd64
          path: downloads/time-server

      - name: Download Cowsay
        uses: actions/download-artifact@v4
        with:
          name: image-cowsay-amd64
          path: downloads/cowsay

      - name: Download Everything
        uses: actions/download-artifact@v4
        with:
          name: image-everything-amd64
          path: downloads/everything

      - name: Load Docker Images
        run: |
          # Use find to locate all tar.gz files recursively and pipe them to docker load via gzip
          find downloads -name "*.tar.gz" -print0 | xargs -0 -I {} sh -c 'echo "Loading {}"; gzip -dc "{}" | docker load'

      - name: Prepare environment
        run: make prepare

      - name: run sequential e2e
        run: |
          make e2e-sequential SKIP_DOCKER_REBUILD=true CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-e2e-sequential.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-e2e-sequential.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  e2e-parallel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-server-images, build-test-images]
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    if: ${{ needs.changes.outputs.src == 'true' }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af --volumes || true

      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y make xz-utils curl unzip git ca-certificates gzip tar
          sudo apt-get clean

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-amd64
          path: downloads/server

      - name: Download HTTP Echo
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-amd64
          path: downloads/http-echo

      - name: Download Time Server
        uses: actions/download-artifact@v4
        with:
          name: image-time-server-amd64
          path: downloads/time-server

      - name: Download Cowsay
        uses: actions/download-artifact@v4
        with:
          name: image-cowsay-amd64
          path: downloads/cowsay

      - name: Download Everything
        uses: actions/download-artifact@v4
        with:
          name: image-everything-amd64
          path: downloads/everything

      - name: Load Docker Images
        run: |
          find downloads -name "*.tar.gz" -print0 | xargs -0 -I {} sh -c 'echo "Loading {}"; gzip -dc "{}" | docker load'

      - name: Prepare environment
        run: make prepare

      - name: run parallel e2e
        run: |
          make e2e-parallel SHARD=${{ matrix.shard }} SKIP_DOCKER_REBUILD=true CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-e2e-parallel.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-e2e-parallel.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  e2e-public-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, build-server-images, build-test-images]
    if: ${{ needs.changes.outputs.src == 'true' }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af --volumes || true

      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y make xz-utils curl unzip git ca-certificates gzip tar
          sudo apt-get clean

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-

      - name: Prepare environment
        run: make prepare

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-amd64
          path: downloads/server

      - name: Download HTTP Echo
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-amd64
          path: downloads/http-echo

      - name: Load Docker Images
        run: |
          find downloads -name "*.tar.gz" -print0 | xargs -0 -I {} sh -c 'echo "Loading {}"; gzip -dc "{}" | docker load'

      - name: test public api
        run: |
          make test-public-api CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-public-api.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-public-api.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-server-images]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloads
          name: image-server-amd64

      - name: Load Docker Image
        run: |
          find downloads -name "server.tar.gz" -print0 | xargs -0 -I {} sh -c 'echo "Loading {}"; gzip -dc "{}" | docker load'

      - name: Smoke Test
        run: |
          chmod +x server/tests/smoke_test.sh
          ./server/tests/smoke_test.sh mcpany/server:latest

  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-server-images, build-test-images, build-ui-images]
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    if: ${{ needs.changes.outputs.src == 'true' }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af --volumes || true

      - uses: actions/checkout@v6

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-amd64
          path: downloads/server

      - name: Download UI Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-amd64
          path: downloads/ui

      - name: Download UI Test Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-test-amd64
          path: downloads/ui-test

      - name: Download HTTP Echo
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-amd64
          path: downloads/http-echo

      - name: Load Docker Images
        run: |
          find downloads -name "*.tar.gz" -print0 | xargs -0 -I {} sh -c 'echo "Loading {}"; gzip -dc "{}" | docker load'

      - name: Test UI
        run: |
          SERVER_IMAGE=mcpany/server:latest make -C ui test-ci PLAYWRIGHT_ARGS="--shard=${{ matrix.shard }}"

  k8s-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-server-images, build-ui-images]
    if: ${{ needs.changes.outputs.src == 'true' }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo docker system prune -af --volumes || true

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install UI Dependencies
        run: |
          cd ui
          npm install
          npx playwright install chromium

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mcp-e2e
          wait: 120s

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-amd64
          path: downloads/server

      - name: Download Operator Image
        uses: actions/download-artifact@v4
        with:
          name: image-operator-amd64
          path: downloads/operator

      - name: Download UI Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-amd64
          path: downloads/ui

      - name: Load Docker Images into Kind
        run: |
          # Use find to locate all tar.gz files recursively and pipe them to docker load via gzip
          find downloads -name "*.tar.gz" -print0 | xargs -0 -I {} sh -c 'echo "Loading {}"; gzip -dc "{}" | docker load'

          # Now load specific images into Kind
          kind load docker-image mcpany/server:latest --name mcp-e2e
          kind load docker-image mcpany/operator:latest --name mcp-e2e
          kind load docker-image mcpany/ui:latest --name mcp-e2e

      - name: Load Docker Images already loaded above
        run: |
          echo "Images already loaded in previous step."

      - name: Run K8s E2E Tests
        run: |
          make k8s-e2e SKIP_IMAGE_BUILD=true IMAGE_TAG=latest

  ci-success:
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        build-server-images,
        build-test-images,
        build-ui-images,
        unit-test,
        e2e-sequential,
        e2e-parallel,
        e2e-public-api,
        docker-smoke-test,
        ui-test,
        k8s-e2e,
      ]
    if: always()
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies (gh, jq)
        run: |
          SUDO=""
          if command -v sudo >/dev/null; then
            SUDO="sudo"
          fi

          install_dependencies() {
            if ! command -v curl &> /dev/null || ! command -v jq &> /dev/null; then
              echo "curl or jq not found. Installing..."
              if command -v apt-get &> /dev/null; then
                $SUDO apt-get update && $SUDO apt-get install -y curl ca-certificates jq
              elif command -v apk &> /dev/null; then
                $SUDO apk add --no-cache curl ca-certificates jq
              elif command -v yum &> /dev/null; then
                $SUDO yum install -y curl ca-certificates jq
              elif command -v dnf &> /dev/null; then
                $SUDO dnf install -y curl ca-certificates jq
              else
                echo "Could not find package manager. Trying to proceed..."
              fi
            fi
          }

          if ! command -v gh &> /dev/null; then
            echo "gh not found. Installing..."
            install_dependencies

            GH_VERSION="2.65.0"
            ARCH=$(uname -m)
            case $ARCH in
              x86_64) ARCH_STR="amd64" ;;
              aarch64) ARCH_STR="arm64" ;;
              *) echo "Unsupported arch: $ARCH"; exit 1 ;;
            esac

            mkdir -p /tmp/gh-install
            URL="https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH_STR}.tar.gz"
            TARBALL="/tmp/gh-install/gh.tar.gz"

            if command -v curl &> /dev/null; then
              echo "Downloading with curl..."
              for i in {1..5}; do
                curl -fsSL --retry 5 --retry-connrefused --retry-max-time 60 "$URL" -o "$TARBALL" && break || {
                  echo "Curl attempt $i failed. Retrying in 10s..."
                  sleep 10
                }
              done
            elif command -v wget &> /dev/null; then
              echo "Downloading with wget..."
              for i in {1..5}; do
                wget -q "$URL" -O "$TARBALL" && break || {
                  echo "Wget attempt $i failed. Retrying in 10s..."
                  sleep 10
                }
              done
            else
              echo "Neither curl nor wget found. Cannot install gh."
              exit 1
            fi

            if [ -f "$TARBALL" ]; then
              tar xz -C /tmp/gh-install -f "$TARBALL"
              BIN_PATH="/tmp/gh-install/gh_${GH_VERSION}_linux_${ARCH_STR}/bin/gh"
              if [ -w /usr/local/bin ]; then
                 cp "$BIN_PATH" /usr/local/bin/
              elif command -v sudo &> /dev/null; then
                 sudo cp "$BIN_PATH" /usr/local/bin/
              else
                 mkdir -p "$HOME/.local/bin"
                 cp "$BIN_PATH" "$HOME/.local/bin/"
                 echo "$HOME/.local/bin" >> $GITHUB_PATH
              fi
              rm -rf /tmp/gh-install
              echo "gh installed successfully."
            else
              echo "Failed to download gh after retries."
              exit 1
            fi
          else
            echo "gh is already installed."
          fi

      - name: Auto-Squash
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}" || echo "Failed to enable auto-merge (check permissions/settings)"

      - name: Check Results and Comment
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          NEEDS_JSON: ${{ toJson(needs) }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ./.github/scripts/check-results-and-comment.sh
