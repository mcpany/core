name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: oci-runner # ubuntu-slim
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Compare against the base branch
            DIFF=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          else
            # Push event: compare against previous commit
            DIFF=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Changed files:"
          echo "$DIFF"

          SRC_CHANGED="false"
          while IFS= read -r file; do
            if [[ -z "$file" ]]; then continue; fi
            # Ignore markdown, txt, docs, license
            if [[ "$file" == *.md ]] || [[ "$file" == *.txt ]] || [[ "$file" == docs/* ]] || [[ "$file" == LICENSE ]]; then
              continue
            fi
            # Found a source file
            SRC_CHANGED="true"
            break
          done <<< "$DIFF"

          echo "src=$SRC_CHANGED" >> $GITHUB_OUTPUT

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: oci-runner # ubuntu-latest
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      # Cache Tools (protoc, helm, etc.)
      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-${{ hashFiles('Makefile', 'server/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-

      # Cache Lint (golangci-lint, pre-commit)
      - name: Cache Lint
        uses: actions/cache@v4
        with:
          path: build/.cache
          key: ${{ runner.os }}-lint-cache-${{ hashFiles('server/go.sum', 'server/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-lint-cache-

      - name: Install dependencies
        run: |
          if command -v apt-get &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y make xz-utils build-essential
          elif command -v apk &> /dev/null; then
             sudo apk add --no-cache make xz build-base
          fi

      - name: Prepare environment
        run: make prepare

      - name: Lint
        run: make lint

  unit-test:
    runs-on: oci-runner # ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    if: ${{ needs.changes.outputs.src == 'true' }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if command -v apt-get &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y make xz-utils build-essential
          elif command -v apk &> /dev/null; then
             sudo apk add --no-cache make xz build-base
          fi

      - name: Configure Docker Registry Mirrors
        run: |
          # Configure multiple mirrors in array format
          # Docker will try mirror.gcr.io first.
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors": ["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json

          if sudo systemctl restart docker 2>/dev/null; then
            echo "Docker restarted via systemctl"
          elif sudo service docker restart 2>/dev/null; then
            echo "Docker restarted via service"
          else
            echo "Could not restart docker via systemctl or service. Attempting SIGHUP..."
            sudo pkill -SIGHUP dockerd || echo "Failed to SIGHUP dockerd. Mirrors might not be applied."
          fi
          docker info # Verify the mirrors are listed

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Docker Cache
        uses: actions/cache@v4
        with:
          path: build/buildx-cache
          key: ${{ runner.os }}-buildx-${{ steps.get-date.outputs.week }}-${{ hashFiles('tests/integration/examples/Dockerfile.timeserver', 'tests/integration/examples/timeserver_patch/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ steps.get-date.outputs.week }}-${{ hashFiles('tests/integration/examples/Dockerfile.timeserver', 'tests/integration/examples/timeserver_patch/**') }}-
            ${{ runner.os }}-buildx-${{ steps.get-date.outputs.week }}-

      - name: Cache Docker images
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: docker-images-${{ runner.os }}-${{ steps.get-date.outputs.week }}

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-

      - name: Prepare environment
        run: make prepare CACHE_TO=type=local,dest=build/buildx-cache CACHE_FROM=type=local,src=build/buildx-cache

      - name: Test (Short)
        run: |
          make test-fast CACHE_TO=type=local,dest=build/buildx-cache CACHE_FROM=type=local,src=build/buildx-cache COVERAGE_FILE=coverage-fast.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-fast.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  e2e-parallel:
    runs-on: oci-runner # ubuntu-latest
    timeout-minutes: 30
    needs: [build-images]
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if command -v apt-get &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y make xz-utils build-essential
          elif command -v apk &> /dev/null; then
             sudo apk add --no-cache make xz build-base
          fi

      - name: Configure Docker Registry Mirrors
        run: |
          # Configure multiple mirrors in array format
          # Docker will try mirror.gcr.io first.
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors": ["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json

          if sudo systemctl restart docker 2>/dev/null; then
            echo "Docker restarted via systemctl"
          elif sudo service docker restart 2>/dev/null; then
            echo "Docker restarted via service"
          else
            echo "Could not restart docker via systemctl or service. Attempting SIGHUP..."
            sudo pkill -SIGHUP dockerd || echo "Failed to SIGHUP dockerd. Mirrors might not be applied."
          fi
          docker info # Verify the mirrors are listed

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Download HTTP Echo Image
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-${{ steps.detect-arch.outputs.slug }}

      - name: Download Time Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-time-server-${{ steps.detect-arch.outputs.slug }}

      - name: Download Cowsay Image
        uses: actions/download-artifact@v4
        with:
          name: image-cowsay-${{ steps.detect-arch.outputs.slug }}

      - name: Download Everything Image
        uses: actions/download-artifact@v4
        with:
          name: image-everything-${{ steps.detect-arch.outputs.slug }}

      - name: Load Docker Images
        run: |
          for f in *.tar; do
            docker load -i "$f"
          done

      - name: Prepare environment
        run: make prepare

      - name: run parallel e2e
        run: |
          make e2e-parallel SHARD=${{ matrix.shard }} SKIP_DOCKER_REBUILD=true CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-e2e-parallel.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-e2e-parallel.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  build-images:
    name: Build Docker Images (${{ matrix.platform }})
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            slug: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            slug: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Generate Protobufs
        run: |
          make gen

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build and Save Images
        run: |
          PLATFORM="${{ matrix.platform }}"
          SLUG="${{ matrix.slug }}"

          # Server
          make -C server build-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=server-$SLUG CACHE_FROM=type=gha,scope=server-$SLUG
          docker save -o server.tar mcpany/server:latest

          # HTTP Echo
          make -C server build-http-echo-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=http-echo-$SLUG CACHE_FROM=type=gha,scope=http-echo-$SLUG
          docker save -o http-echo.tar mcpany/http-echo-server:latest

          # Time Server
          make -C server build-e2e-timeserver-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=time-server-$SLUG CACHE_FROM=type=gha,scope=time-server-$SLUG
          docker save -o time-server.tar mcpany-e2e-time-server

          # Cowsay
          make -C server build-cowsay-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=cowsay-$SLUG CACHE_FROM=type=gha,scope=cowsay-$SLUG
          docker save -o cowsay.tar mcpany/e2e-cowsay-server:latest

          # Everything
          make -C server build-everything-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=everything-$SLUG CACHE_FROM=type=gha,scope=everything-$SLUG
          docker save -o everything.tar mcpany/everything:latest

          # UI
          make -C server docker-build-ui PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=ui-$SLUG CACHE_FROM=type=gha,scope=ui-$SLUG
          docker save -o ui.tar mcpany/ui:latest

          # Operator
          make -C server docker-build-operator PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=operator-$SLUG CACHE_FROM=type=gha,scope=operator-$SLUG
          docker save -o operator.tar mcpany/operator:latest

          # UI Test Image
          make -C ui build-test-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=ui-test-$SLUG CACHE_FROM=type=gha,scope=ui-test-$SLUG
          docker save -o ui-test-image.tar mcpany-ui-e2e:latest

      - name: Upload Server Image
        uses: actions/upload-artifact@v4
        with:
          name: image-server-${{ matrix.slug }}
          path: server.tar
          retention-days: 1

      - name: Upload HTTP Echo Image
        uses: actions/upload-artifact@v4
        with:
          name: image-http-echo-${{ matrix.slug }}
          path: http-echo.tar
          retention-days: 1

      - name: Upload Time Server Image
        uses: actions/upload-artifact@v4
        with:
          name: image-time-server-${{ matrix.slug }}
          path: time-server.tar
          retention-days: 1

      - name: Upload Cowsay Image
        uses: actions/upload-artifact@v4
        with:
          name: image-cowsay-${{ matrix.slug }}
          path: cowsay.tar
          retention-days: 1

      - name: Upload Everything Image
        uses: actions/upload-artifact@v4
        with:
          name: image-everything-${{ matrix.slug }}
          path: everything.tar
          retention-days: 1

      - name: Upload UI Image
        uses: actions/upload-artifact@v4
        with:
          name: image-ui-${{ matrix.slug }}
          path: ui.tar
          retention-days: 1

      - name: Upload Operator Image
        uses: actions/upload-artifact@v4
        with:
          name: image-operator-${{ matrix.slug }}
          path: operator.tar
          retention-days: 1

      - name: Upload UI Test Image
        uses: actions/upload-artifact@v4
        with:
          name: image-ui-test-${{ matrix.slug }}
          path: ui-test-image.tar
          retention-days: 1

  e2e-sequential:
    runs-on: oci-runner # ubuntu-latest
    timeout-minutes: 60
    needs: [build-images]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if command -v apt-get &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y make xz-utils build-essential
          elif command -v apk &> /dev/null; then
             sudo apk add --no-cache make xz build-base
          fi

      - name: Configure Docker Registry Mirrors
        run: |
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors": ["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json

          if sudo systemctl restart docker 2>/dev/null; then
            echo "Docker restarted via systemctl"
          elif sudo service docker restart 2>/dev/null; then
            echo "Docker restarted via service"
          else
            echo "Could not restart docker via systemctl or service. Attempting SIGHUP..."
            sudo pkill -SIGHUP dockerd || echo "Failed to SIGHUP dockerd. Mirrors might not be applied."
          fi
          docker info

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Download HTTP Echo Image
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-${{ steps.detect-arch.outputs.slug }}

      - name: Download Time Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-time-server-${{ steps.detect-arch.outputs.slug }}

      - name: Download Cowsay Image
        uses: actions/download-artifact@v4
        with:
          name: image-cowsay-${{ steps.detect-arch.outputs.slug }}

      - name: Download Everything Image
        uses: actions/download-artifact@v4
        with:
          name: image-everything-${{ steps.detect-arch.outputs.slug }}

      - name: Load Docker Images
        run: |
          for f in *.tar; do
            docker load -i "$f"
          done

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-

      - name: Prepare environment
        run: make prepare

      - name: run sequential e2e
        run: |
          make e2e-sequential SKIP_DOCKER_REBUILD=true CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-e2e-sequential.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-e2e-sequential.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  e2e-public-api:
    runs-on: oci-runner # ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    if: ${{ needs.changes.outputs.src == 'true' }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
