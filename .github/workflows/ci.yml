        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-

      # Intentionally omitting Docker downloads as e2e-public-api doesn't need them

      - name: Prepare environment
        run: make prepare

      - name: Debug Environment
        run: |
          docker info
          go env

      - name: test public api
        run: |
          make test-public-api SKIP_DOCKER_REBUILD=true CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-public-api.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-public-api.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-images]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Install dependencies
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get &> /dev/null; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk &> /dev/null; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Docker Image
        run: |
          docker load -i image.tar
          rm image.tar

      - name: Smoke Test
        run: |
          chmod +x server/tests/smoke_test.sh
          ./server/tests/smoke_test.sh mcpany/server:latest

  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: [build-images]
    env:
      PLAYWRIGHT_WORKERS: 1
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    steps:
      - name: Free Disk Space (Fast)
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO rm -rf /usr/local/lib/android
          $SUDO rm -rf /usr/share/dotnet
          $SUDO rm -rf /opt/ghc
          $SUDO rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get &> /dev/null; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk &> /dev/null; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Server Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download UI Test Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-test-${{ steps.detect-arch.outputs.slug }}

      - name: Load UI Test Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download HTTP Echo Image
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-${{ steps.detect-arch.outputs.slug }}

      - name: Load HTTP Echo Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Test UI
        run: |
          SERVER_IMAGE=mcpany/server:latest make -C ui test-ci PLAYWRIGHT_ARGS="--shard=${{ matrix.shard }}"

  k8s-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Increased timeout for k8s tests
    needs: [build-images]
    continue-on-error: true
    steps:
      - name: Free Disk Space (Fast)
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO rm -rf /usr/local/lib/android
          $SUDO rm -rf /usr/share/dotnet
          $SUDO rm -rf /opt/ghc
          $SUDO rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install UI Dependencies
        run: |
          cd ui
          npm ci
          npx playwright install chromium

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mcp-e2e
          wait: 120s

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Server Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download Operator Image
        uses: actions/download-artifact@v4
        with:
          name: image-operator-${{ steps.detect-arch.outputs.slug }}

      - name: Load Operator Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download UI Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-${{ steps.detect-arch.outputs.slug }}

      - name: Load UI Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Load Docker Images into Kind
        run: |
          # Now load specific images into Kind
          kind load docker-image mcpany/server:latest --name mcp-e2e
          kind load docker-image mcpany/operator:latest --name mcp-e2e
          kind load docker-image mcpany/ui:latest --name mcp-e2e

      - name: Run K8s E2E Tests
        run: |
          make k8s-e2e SKIP_IMAGE_BUILD=true IMAGE_TAG=latest

  ci-success:
    runs-on: ubuntu-slim
    needs:
      [
        changes,
        build-images,
        e2e-sequential,
        e2e-parallel,
        e2e-public-api,
        docker-smoke-test,
        unit-test,
        ui-test,
        k8s-e2e
      ]
    if: always()
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies (gh, jq)
        run: |
          SUDO=""
          if command -v sudo >/dev/null; then
            SUDO="sudo"
          fi

          install_dependencies() {
            if ! command -v curl &> /dev/null || ! command -v jq &> /dev/null; then
              echo "curl or jq not found. Installing..."
              if command -v apt-get &> /dev/null; then
                $SUDO apt-get update && $SUDO apt-get install -y curl ca-certificates jq
              elif command -v apk &> /dev/null; then
                $SUDO apk add --no-cache curl ca-certificates jq
              elif command -v yum &> /dev/null; then
                $SUDO yum install -y curl ca-certificates jq
              elif command -v dnf &> /dev/null; then
                $SUDO dnf install -y curl ca-certificates jq
              else
                echo "Could not find package manager. Trying to proceed..."
              fi
            fi
          }

          if ! command -v gh &> /dev/null; then
            echo "gh not found. Installing..."
            install_dependencies

            GH_VERSION="2.65.0"
            ARCH=$(uname -m)
            case $ARCH in
              x86_64) ARCH_STR="amd64" ;;
              aarch64) ARCH_STR="arm64" ;;
              *) echo "Unsupported arch: $ARCH"; exit 1 ;;
            esac

            mkdir -p /tmp/gh-install
            URL="https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH_STR}.tar.gz"
            TARBALL="/tmp/gh-install/gh.tar.gz"

            if command -v curl &> /dev/null; then
              echo "Downloading with curl..."
              for i in {1..5}; do
                curl -fsSL --retry 5 --retry-connrefused --retry-max-time 60 "$URL" -o "$TARBALL" && break || {
                  echo "Curl attempt $i failed. Retrying in 10s..."
                  sleep 10
                }
              done
            elif command -v wget &> /dev/null; then
              echo "Downloading with wget..."
              for i in {1..5}; do
                wget -q "$URL" -O "$TARBALL" && break || {
                  echo "Wget attempt $i failed. Retrying in 10s..."
                  sleep 10
                }
              done
            else
              echo "Neither curl nor wget found. Cannot install gh."
              exit 1
            fi

            if [ ! -f "$TARBALL" ]; then
              echo "Failed to download gh after retries."
              exit 1
            fi

            tar xz -C /tmp/gh-install -f "$TARBALL"

            BIN_PATH="/tmp/gh-install/gh_${GH_VERSION}_linux_${ARCH_STR}/bin/gh"

            if [ -w /usr/local/bin ]; then
               cp "$BIN_PATH" /usr/local/bin/
            elif command -v sudo &> /dev/null; then
               sudo cp "$BIN_PATH" /usr/local/bin/
            else
               mkdir -p "$HOME/.local/bin"
               cp "$BIN_PATH" "$HOME/.local/bin/"
               echo "$HOME/.local/bin" >> $GITHUB_PATH
            fi

            rm -rf /tmp/gh-install
            echo "gh installed successfully."
          else
            echo "gh is already installed."
          fi

      - name: Auto-Squash
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}" || echo "Failed to enable auto-merge (check permissions/settings)"

      - name: Check Results and Comment
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          NEEDS_JSON: ${{ toJson(needs) }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ./.github/scripts/check-results-and-comment.sh
