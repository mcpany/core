          elif command -v apk > /dev/null 2>&1; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
