  k8s-e2e:
    runs-on: ubuntu-latest
    # runs-on: oci-runner
    # container:
    #   image: iowoi/mcp-runner:latest
    #   options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    timeout-minutes: 360 # Increased timeout for k8s tests
    needs: [changes, build-images]
    if: ${{ needs.changes.outputs.src == 'true' }}
    continue-on-error: true
    steps:
      - name: Free Disk Space (Fast)
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO rm -rf /usr/local/lib/android
          $SUDO rm -rf /usr/share/dotnet
          $SUDO rm -rf /opt/ghc
          $SUDO rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Install dependencies (Idempotent)
        run: |
          if command -v make >/dev/null && command -v curl >/dev/null; then
            echo "Dependencies already installed in container, skipping apt-get."
            exit 0
          fi
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get > /dev/null 2>&1; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk > /dev/null 2>&1; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install UI Dependencies
        run: |
          cd ui
          npm ci
          npx playwright install chromium

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mcp-e2e
          wait: 120s

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Server Image
        run: |
          sudo docker load -i image.tar || docker load -i image.tar
          rm -f image.tar

      - name: Download Operator Image
        uses: actions/download-artifact@v4
        with:
          name: image-operator-${{ steps.detect-arch.outputs.slug }}

      - name: Load Operator Image
        run: |
          sudo docker load -i image.tar || docker load -i image.tar
          rm -f image.tar

      - name: Download UI Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-${{ steps.detect-arch.outputs.slug }}

      - name: Load UI Image
        run: |
          sudo docker load -i image.tar || docker load -i image.tar
          rm -f image.tar

      - name: Load Docker Images into Kind
        run: |
          # Now load specific images into Kind
          kind load docker-image mcpany/server:latest --name mcp-e2e
          kind load docker-image mcpany/operator:latest --name mcp-e2e
          kind load docker-image mcpany/ui:latest --name mcp-e2e

      - name: Run K8s E2E Tests
        run: |
          make k8s-e2e SKIP_IMAGE_BUILD=true IMAGE_TAG=latest

  ci-success:
    runs-on: oci-runner
    container:
      image: iowoi/mcp-runner:latest
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    needs:
      [
        changes,
        lint,
        build-images,
        e2e-sequential,
        e2e-parallel,
        e2e-public-api,
        docker-smoke-test,
        unit-test,
        ui-test,
        k8s-e2e,
      ]
    if: always()
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Idempotent)
        run: |
          if command -v make >/dev/null && command -v curl >/dev/null; then
            echo "Dependencies already installed in container, skipping apt-get."
            exit 0
          fi
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get > /dev/null 2>&1; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk > /dev/null 2>&1; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Auto-Squash
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}" || echo "Failed to enable auto-merge (check permissions/settings)"

      - name: Check Results and Comment
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          NEEDS_JSON: ${{ toJson(needs) }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ./.github/scripts/check-results-and-comment.sh
