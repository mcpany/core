name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # GOMAXPROCS allowed to default to max cores available to speed up unit tests
  GOGC: 50 # Balanced GC to avoid excessive CPU usage while keeping memory in check
  GO_RACE: "" # Disable race detector in CI due to OOM on constrained runners

jobs:
  changes:
    runs-on: ubuntu-slim
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Install dependencies
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO apt-get update && $SUDO apt-get install -y git

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changes
        id: filter
        run: |
          set -e
          git config --global --add safe.directory "*"
          # Ensure we have the base branch for comparison
          git fetch origin ${{ github.base_ref || 'main' }}

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Compare against the base branch
            DIFF=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          else
            # Push event: compare against previous commit
            DIFF=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Changed files:"
          echo "$DIFF"

          SRC_CHANGED="false"
          while IFS= read -r file; do
            if [[ -z "$file" ]]; then continue; fi
            # Ignore markdown, txt, docs, license
            if [[ "$file" == *.md ]] || [[ "$file" == *.txt ]] || [[ "$file" == docs/* ]] || [[ "$file" == LICENSE ]]; then
              continue
            fi
            # Found a source file
            SRC_CHANGED="true"
            break
          done <<< "$DIFF"

          echo "src=$SRC_CHANGED" >> $GITHUB_OUTPUT

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Free Disk Space (Fast)
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO rm -rf /usr/local/lib/android
          $SUDO rm -rf /usr/share/dotnet
          $SUDO rm -rf /opt/ghc
          $SUDO rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      # Cache Tools (protoc, helm, etc.)
      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-v3-${{ hashFiles('Makefile', 'server/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-v3-

      # Cache Lint (golangci-lint, pre-commit)
      - name: Cache Lint
        uses: actions/cache@v4
        with:
          path: build/.cache
          key: ${{ runner.os }}-lint-cache-v3-${{ hashFiles('server/go.sum', 'server/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-lint-cache-v3-

      - name: Install dependencies
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get &> /dev/null; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk &> /dev/null; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Prepare environment
        run: make prepare

      - name: Lint
        run: make lint

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build-images]
    if: ${{ needs.changes.outputs.src == 'true' }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO rm -rf /usr/local/lib/android
          $SUDO rm -rf /usr/share/dotnet
          $SUDO rm -rf /opt/ghc
          $SUDO rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get &> /dev/null; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk &> /dev/null; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-

      - name: Download Time Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-time-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Time Server Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Prepare environment
        run: make prepare CACHE_TO=type=local,dest=build/buildx-cache CACHE_FROM=type=local,src=build/buildx-cache

      - name: Test (Short)
        run: |
          make test-fast SKIP_DOCKER_REBUILD=true CACHE_TO=type=local,dest=build/buildx-cache CACHE_FROM=type=local,src=build/buildx-cache COVERAGE_FILE=coverage-fast.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-fast.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  e2e-parallel:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: [build-images]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO rm -rf /usr/local/lib/android
          $SUDO rm -rf /usr/share/dotnet
          $SUDO rm -rf /opt/ghc
          $SUDO rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get &> /dev/null; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk &> /dev/null; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-

      # Intentionally omitting Server Image download for e2e-parallel as it uses binary

      - name: Download HTTP Echo Image
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-${{ steps.detect-arch.outputs.slug }}

      - name: Load HTTP Echo Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download Time Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-time-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Time Server Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download Cowsay Image
        uses: actions/download-artifact@v4
        with:
          name: image-cowsay-${{ steps.detect-arch.outputs.slug }}

      - name: Load Cowsay Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download Everything Image
        uses: actions/download-artifact@v4
        with:
          name: image-everything-${{ steps.detect-arch.outputs.slug }}

      - name: Load Everything Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Prepare environment
        run: make prepare

      - name: run parallel e2e
        run: |
          make e2e-parallel SHARD=${{ matrix.shard }} SKIP_DOCKER_REBUILD=true CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-e2e-parallel.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-e2e-parallel.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  build-images:
    name: Build Docker Image (${{ matrix.image }}, ${{ matrix.platform_slug }})
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [server, http-echo, time-server, cowsay, everything, ui, operator, ui-test]
        platform_slug: [amd64, arm64]
        include:
          - platform_slug: amd64
            platform: linux/amd64
          - platform_slug: arm64
            platform: linux/arm64
    steps:
      - name: Free Disk Space (Fast)
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO rm -rf /usr/local/lib/android
          $SUDO rm -rf /usr/share/dotnet
          $SUDO rm -rf /opt/ghc
          $SUDO rm -rf /usr/local/share/boost
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get &> /dev/null; then
            $SUDO apt-get update && $SUDO apt-get install -y make curl unzip grep sed findutils build-essential
          elif command -v apk &> /dev/null; then
             $SUDO apk add --no-cache make curl unzip grep sed findutils build-base
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            server/tests/integration/upstream/package-lock.json
            ui/package-lock.json

      - name: Install UI Dependencies
        if: matrix.image == 'ui' || matrix.image == 'ui-test'
        run: |
          cd ui
          npm ci

      - name: Generate Protobufs
        run: |
          make gen

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build and Save Image
        run: |
          PLATFORM="${{ matrix.platform }}"
          SLUG="${{ matrix.platform_slug }}"
          IMAGE="${{ matrix.image }}"
          CACHE_SCOPE="${IMAGE}-${SLUG}"

          case $IMAGE in
            server)
              make -C server build-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=$CACHE_SCOPE CACHE_FROM=type=gha,scope=$CACHE_SCOPE
              docker save -o image.tar mcpany/server:latest
              ;;
            http-echo)
              make -C server build-http-echo-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=$CACHE_SCOPE CACHE_FROM=type=gha,scope=$CACHE_SCOPE
              docker save -o image.tar mcpany/http-echo-server:latest
              ;;
            time-server)
              make -C server build-e2e-timeserver-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=$CACHE_SCOPE CACHE_FROM=type=gha,scope=$CACHE_SCOPE
              docker save -o image.tar mcpany-e2e-time-server
              ;;
            cowsay)
              make -C server build-cowsay-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=$CACHE_SCOPE CACHE_FROM=type=gha,scope=$CACHE_SCOPE
              docker save -o image.tar mcpany/e2e-cowsay-server:latest
              ;;
            everything)
              make -C server build-everything-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=$CACHE_SCOPE CACHE_FROM=type=gha,scope=$CACHE_SCOPE
              docker save -o image.tar mcpany/everything:latest
              ;;
            ui)
              make -C server docker-build-ui PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=$CACHE_SCOPE CACHE_FROM=type=gha,scope=$CACHE_SCOPE
              docker save -o image.tar mcpany/ui:latest
              ;;
            operator)
              make -C server docker-build-operator PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=$CACHE_SCOPE CACHE_FROM=type=gha,scope=$CACHE_SCOPE
              docker save -o image.tar mcpany/operator:latest
              ;;
            ui-test)
              make -C ui build-test-docker PLATFORMS=$PLATFORM CACHE_TO=type=gha,mode=max,scope=$CACHE_SCOPE CACHE_FROM=type=gha,scope=$CACHE_SCOPE
              docker save -o image.tar mcpany-ui-e2e:latest
              ;;
            *)
              echo "Unknown image: $IMAGE"
              exit 1
              ;;
          esac

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.image }}-${{ matrix.platform_slug }}
          path: image.tar
          retention-days: 1

  e2e-sequential:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: [build-images]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO rm -rf /usr/local/lib/android
          $SUDO rm -rf /usr/share/dotnet
          $SUDO rm -rf /opt/ghc
          $SUDO rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get &> /dev/null; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk &> /dev/null; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Server Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download HTTP Echo Image
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-${{ steps.detect-arch.outputs.slug }}

      - name: Load HTTP Echo Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download Time Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-time-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Time Server Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download Cowsay Image
        uses: actions/download-artifact@v4
        with:
          name: image-cowsay-${{ steps.detect-arch.outputs.slug }}

      - name: Load Cowsay Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Download Everything Image
        uses: actions/download-artifact@v4
        with:
          name: image-everything-${{ steps.detect-arch.outputs.slug }}

      - name: Load Everything Image
        run: |
          docker load -i image.tar
          rm -f image.tar

      - name: Prepare environment
        run: make prepare

      - name: run sequential e2e
        run: |
          make e2e-sequential SKIP_DOCKER_REBUILD=true CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-e2e-sequential.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-e2e-sequential.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  e2e-public-api:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: [build-images]
    if: ${{ needs.changes.outputs.src == 'true' }}
    continue-on-error: true # Temporarily allow failure while stabilizing
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
