      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-public-api.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-images]
    steps:
      - uses: actions/checkout@v5

      - name: Configure Docker Registry Mirrors
        run: |
          # Configure multiple mirrors in array format
          # Docker will try mirror.gcr.io first.
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors": ["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json

          if sudo systemctl restart docker 2>/dev/null; then
            echo "Docker restarted via systemctl"
          elif sudo service docker restart 2>/dev/null; then
            echo "Docker restarted via service"
          else
            echo "Could not restart docker via systemctl or service. Attempting SIGHUP..."
            sudo pkill -SIGHUP dockerd || echo "Failed to SIGHUP dockerd. Mirrors might not be applied."
          fi
          docker info # Verify the mirrors are listed

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Docker Image
        run: |
          docker load -i server.tar

      - name: Smoke Test
        run: |
          chmod +x server/tests/smoke_test.sh
          ./server/tests/smoke_test.sh mcpany/server:latest

  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-images]
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    steps:
      #      - name: Free Disk Space (Ubuntu)
      #        uses: jlumbroso/free-disk-space@main
      #        with:
      #          tool-cache: false
      #          android: true
      #          dotnet: true
      #          haskell: true
      #          large-packages: true
      #          docker-images: false
      #          swap-storage: true
      #
      - uses: actions/checkout@v5

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Download UI Test Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-test-${{ steps.detect-arch.outputs.slug }}

      - name: Download HTTP Echo Image
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-${{ steps.detect-arch.outputs.slug }}

      - name: Load Docker Images
        run: |
          for f in *.tar; do
            docker load -i "$f"
          done

      - name: Test UI
        run: |
          SERVER_IMAGE=mcpany/server:latest make -C ui test-ci PLAYWRIGHT_ARGS="--shard=${{ matrix.shard }}"

  k8s-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-images]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install UI Dependencies
        run: |
          cd ui
          npm install
          npx playwright install chromium

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mcp-e2e
          wait: 120s

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Download Operator Image
        uses: actions/download-artifact@v4
        with:
          name: image-operator-${{ steps.detect-arch.outputs.slug }}

      - name: Download UI Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-${{ steps.detect-arch.outputs.slug }}

      - name: Load Docker Images into Kind
        run: |
          # Load all tarballs into docker daemon first?
          # kind load docker-image requires image in docker daemon or archive.
          # kind load image-archive might be better but let's stick to docker daemon for consistency
          for f in *.tar; do
            docker load -i "$f"
          done

          # Now load specific images into Kind
          kind load docker-image mcpany/server:latest --name mcp-e2e
          kind load docker-image mcpany/operator:latest --name mcp-e2e
          kind load docker-image mcpany/ui:latest --name mcp-e2e

      - name: Load Docker Images already loaded above
        run: |
          echo "Images already loaded in previous step."

      - name: Run K8s E2E Tests
        run: |
          make k8s-e2e SKIP_IMAGE_BUILD=true IMAGE_TAG=latest

  ci-success:
    runs-on: oci-runner # ubuntu-slim
    needs:
      [
        build-images,
        unit-test,
        e2e-sequential,
        e2e-parallel,
        e2e-public-api,
        docker-smoke-test,
        ui-test,
        k8s-e2e,
      ]
    if: always()
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Install gh CLI
        run: |
          install_dependencies() {
            echo "Installing dependencies..."
            if command -v apt-get &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y curl ca-certificates python3
            elif command -v apk &> /dev/null; then
              sudo apk add --no-cache curl ca-certificates python3
            elif command -v yum &> /dev/null; then
              sudo yum install -y curl ca-certificates python3
            elif command -v dnf &> /dev/null; then
              sudo dnf install -y curl ca-certificates python3
            else
              echo "Could not find package manager. Hoping python3 and curl are present..."
            fi
          }

          if ! command -v gh &> /dev/null; then
            echo "gh not found. Installing..."
            install_dependencies

            GH_VERSION="2.65.0"
            ARCH=$(uname -m)
            case $ARCH in
              x86_64) ARCH_STR="amd64" ;;
              aarch64) ARCH_STR="arm64" ;;
              *) echo "Unsupported arch: $ARCH"; exit 1 ;;
            esac

            mkdir -p /tmp/gh-install
            if command -v curl &> /dev/null; then
              curl --retry 5 --retry-connrefused --retry-max-time 60 -fsSL https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH_STR}.tar.gz | tar xz -C /tmp/gh-install
            elif command -v wget &> /dev/null; then
              wget -qO- https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH_STR}.tar.gz | tar xz -C /tmp/gh-install
            else
              echo "Neither curl nor wget found. Cannot install gh."
              exit 1
            fi

            BIN_PATH="/tmp/gh-install/gh_${GH_VERSION}_linux_${ARCH_STR}/bin/gh"

            if [ -w /usr/local/bin ]; then
               cp "$BIN_PATH" /usr/local/bin/
            elif command -v sudo &> /dev/null; then
               sudo cp "$BIN_PATH" /usr/local/bin/
            else
               mkdir -p "$HOME/.local/bin"
               cp "$BIN_PATH" "$HOME/.local/bin/"
               echo "$HOME/.local/bin" >> $GITHUB_PATH
            fi

            rm -rf /tmp/gh-install
            echo "gh installed successfully."
          else
            echo "gh is already installed."
          fi

      - name: Auto-Squash
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}" || echo "Failed to enable auto-merge (check permissions/settings)"

      - name: Check Results and Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_JSON: ${{ toJson(needs) }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 <<EOF
          import os
          import json
          import subprocess
          import sys

          needs_json = os.environ.get("NEEDS_JSON", "{}")
          try:
              needs = json.loads(needs_json)
          except Exception as e:
              print(f"Error parsing NEEDS_JSON: {e}")
              sys.exit(1)

          failed_jobs = [k for k, v in needs.items() if v.get("result") in ["failure", "cancelled"]]

          if not failed_jobs:
              print("All required jobs passed successfully.")
              sys.exit(0)

          print(f"Failed jobs: {failed_jobs}")

          pr_url = os.environ.get("PR_URL")
          repo = os.environ.get("REPO")
          run_id = os.environ.get("RUN_ID")

          if pr_url:
              try:
                  # Fetch failed jobs details using gh cli
                  cmd = ["gh", "run", "view", run_id, "--repo", repo, "--json", "jobs"]
                  res = subprocess.run(cmd, capture_output=True, text=True)

                  details = []
                  if res.returncode == 0:
                      run_data = json.loads(res.stdout)
                      jobs = run_data.get("jobs", [])
                      for job in jobs:
                          if job.get("conclusion") == "failure":
                              steps = job.get("steps", [])
                              failed_steps = [s.get("name") for s in steps if s.get("conclusion") == "failure"]
                              step_str = ", ".join(failed_steps)
                              msg = f"{job['name']}: Failed at step(s) \"{step_str}\"" if failed_steps else f"{job['name']}: Failed"
                              details.append(f"- **{msg}**")

                  if not details:
                      details = [f"- **{name}: Failed**" for name in failed_jobs]

                  body = "❌ **CI Checks Failed**\n\nThe following GitHub Actions checks failed in this run:\n" + "\n".join(details)
                  body += f"\n\n---\n[View Logs](https://github.com/{repo}/actions/runs/{run_id})"

                  subprocess.run(["gh", "pr", "comment", pr_url, "--body", body], check=False)
              except Exception as e:
                  print(f"Failed to post comment: {e}")

          sys.exit(1)
          EOF
