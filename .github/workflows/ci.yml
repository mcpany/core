name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # GOMAXPROCS allowed to default to max cores available to speed up unit tests
  GOGC: 50 # Balanced GC to avoid excessive CPU usage while keeping memory in check
  GO_RACE: "" # Disable race detector in CI due to OOM on constrained runners

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: oci-runner
    container:
      image: iowoi/mcp-runner:latest
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies (Idempotent)
        run: |
          if command -v make >/dev/null && command -v curl >/dev/null; then
            echo "Dependencies already installed in container, skipping apt-get."
            exit 0
          fi
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get > /dev/null 2>&1; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk > /dev/null 2>&1; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Check for changes
        id: filter
        run: |
          set -e
          git config --global --add safe.directory "*"
          # Ensure we have the base branch for comparison
          git fetch origin ${{ github.base_ref || 'main' }}

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Compare against the base branch
            DIFF=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          else
            # Push event: compare against previous commit
            DIFF=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "$DIFF"
          SRC_CHANGED="false"
          echo "$DIFF" | while IFS= read -r file; do
            if [ -z "$file" ]; then continue; fi
            # Ignore markdown, txt, docs, license
            case "$file" in
              *.md|*.txt|docs/*|LICENSE) continue ;;
              *) echo "true" > /tmp/src_changed; break ;;
            esac
          done
          if [ -f /tmp/src_changed ]; then SRC_CHANGED="true"; rm /tmp/src_changed; fi

          echo "src=$SRC_CHANGED" >> $GITHUB_OUTPUT
        shell: bash

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: oci-runner
    container:
      image: iowoi/mcp-runner:latest
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    timeout-minutes: 90
    steps:
      # - name: Free Disk Space (Fast)
      #   run: |
      #     if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
      #     $SUDO rm -rf /usr/local/lib/android
      #     $SUDO rm -rf /usr/share/dotnet
      #     $SUDO rm -rf /opt/ghc
      #     $SUDO rm -rf /usr/local/share/boost

      - name: Debug Environment
        run: |
          id
          ls -l /var/run/docker.sock || echo "No docker socket found"
          ls -ld /__w || echo "No /__w found"

      # - name: Prune Docker
      #   run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Install dependencies (Idempotent)
        run: |
          if command -v make >/dev/null && command -v curl >/dev/null; then
            echo "Dependencies already installed in container, skipping apt-get."
            exit 0
          fi
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get > /dev/null 2>&1; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk > /dev/null 2>&1; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      # - name: Set up Go
      #   uses: actions/setup-go@v6
      #   with:
      #     go-version: "1.24"
      #     cache: true

      # - name: Set up Python
      #   uses: actions/setup-python@v6
      #   with:
      #     python-version: "3.12"
      #     cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt --break-system-packages

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      # Cache Tools (protoc, helm, etc.)
      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-v3-${{ hashFiles('Makefile', 'server/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-v3-

      # Cache Lint (golangci-lint, pre-commit)
      - name: Cache Lint
        uses: actions/cache@v4
        with:
          path: build/.cache
          key: ${{ runner.os }}-lint-cache-v3-${{ hashFiles('server/go.sum', 'server/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-lint-cache-v3-

      - name: Prepare environment
        run: make prepare

      - name: Lint
        run: make lint

  unit-test:
    runs-on: oci-runner
    container:
      image: iowoi/mcp-runner:latest
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    timeout-minutes: 60
    needs: [changes, build-images]
    if: ${{ needs.changes.outputs.src == 'true' }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      # - name: Free Disk Space (Fast)
      #   run: |
      #     if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
      #     $SUDO rm -rf /usr/local/lib/android
      #     $SUDO rm -rf /usr/share/dotnet
      #     $SUDO rm -rf /opt/ghc
      #     $SUDO rm -rf /usr/local/share/boost

      # - name: Prune Docker
      #   run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Install dependencies (Idempotent)
        run: |
          if command -v make >/dev/null && command -v curl >/dev/null; then
            echo "Dependencies already installed in container, skipping apt-get."
            exit 0
          fi
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get > /dev/null 2>&1; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk > /dev/null 2>&1; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      # - name: Set up Go
      #   uses: actions/setup-go@v6
      #   with:
      #     go-version: "1.24"
      #     cache: true

      # - name: Set up Python
      #   uses: actions/setup-python@v6
      #   with:
      #     python-version: "3.12"
      #     cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt --break-system-packages

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-

      - name: Download Time Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-time-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Time Server Image
        run: |
          sudo docker load -i image.tar || docker load -i image.tar
          rm -f image.tar

      - name: Prepare environment
        run: make prepare CACHE_TO=type=local,dest=build/buildx-cache CACHE_FROM=type=local,src=build/buildx-cache

      - name: Test (Short)
        run: |
          make test-fast SKIP_DOCKER_REBUILD=true CACHE_TO=type=local,dest=build/buildx-cache CACHE_FROM=type=local,src=build/buildx-cache COVERAGE_FILE=coverage-fast.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-fast.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  e2e-parallel:
