        run: |
          # Configure multiple mirrors in array format
          # Docker will try mirror.gcr.io first.
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors": ["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json

          if sudo systemctl restart docker 2>/dev/null; then
            echo "Docker restarted via systemctl"
          elif sudo service docker restart 2>/dev/null; then
            echo "Docker restarted via service"
          else
            echo "Could not restart docker via systemctl or service. Attempting SIGHUP..."
            sudo pkill -SIGHUP dockerd || echo "Failed to SIGHUP dockerd. Mirrors might not be applied."
          fi
          docker info # Verify the mirrors are listed

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-${{ steps.get-date.outputs.week }}-

      - name: Prepare environment
        run: make prepare

      - name: test public api
        run: |
          make test-public-api CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-public-api.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-public-api.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-images]
    steps:
      - uses: actions/checkout@v4

      - name: Configure Docker Registry Mirrors
        run: |
          # Configure multiple mirrors in array format
          # Docker will try mirror.gcr.io first.
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors": ["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json

          if sudo systemctl restart docker 2>/dev/null; then
            echo "Docker restarted via systemctl"
          elif sudo service docker restart 2>/dev/null; then
            echo "Docker restarted via service"
          else
            echo "Could not restart docker via systemctl or service. Attempting SIGHUP..."
            sudo pkill -SIGHUP dockerd || echo "Failed to SIGHUP dockerd. Mirrors might not be applied."
          fi
          docker info # Verify the mirrors are listed

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Load Docker Image
        run: |
          docker load -i server.tar

      - name: Smoke Test
        run: |
          chmod +x server/tests/smoke_test.sh
          ./server/tests/smoke_test.sh mcpany/server:latest

  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-images]
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v4

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Download UI Test Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-test-${{ steps.detect-arch.outputs.slug }}

      - name: Download HTTP Echo Image
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-${{ steps.detect-arch.outputs.slug }}

      - name: Load Docker Images
        run: |
          for f in *.tar; do
            docker load -i "$f"
          done

      - name: Test UI
        run: |
          SERVER_IMAGE=mcpany/server:latest make -C ui test-ci PLAYWRIGHT_ARGS="--shard=${{ matrix.shard }}"

  k8s-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-images]
    steps:
      - name: Free Disk Space (Fast)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install UI Dependencies
        run: |
          cd ui
          npm install
          npx playwright install chromium

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mcp-e2e
          wait: 120s

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Download Server Image
        uses: actions/download-artifact@v4
        with:
          name: image-server-${{ steps.detect-arch.outputs.slug }}

      - name: Download Operator Image
        uses: actions/download-artifact@v4
        with:
          name: image-operator-${{ steps.detect-arch.outputs.slug }}

      - name: Download UI Image
        uses: actions/download-artifact@v4
        with:
          name: image-ui-${{ steps.detect-arch.outputs.slug }}

      - name: Download HTTP Echo Image
        uses: actions/download-artifact@v4
        with:
          name: image-http-echo-${{ steps.detect-arch.outputs.slug }}

      - name: Load Docker Images into Kind
        run: |
          # Load all tarballs into docker daemon first?
          # kind load docker-image requires image in docker daemon or archive.
          # kind load image-archive might be better but let's stick to docker daemon for consistency
          for f in *.tar; do
            docker load -i "$f"
          done

          # Now load specific images into Kind
          kind load docker-image mcpany/server:latest --name mcp-e2e
          kind load docker-image mcpany/operator:latest --name mcp-e2e
          kind load docker-image mcpany/ui:latest --name mcp-e2e
          kind load docker-image mcpany/http-echo-server:latest --name mcp-e2e

      - name: Load Docker Images already loaded above
        run: |
          echo "Images already loaded in previous step."

      - name: Run K8s E2E Tests
        run: |
          make k8s-e2e SKIP_IMAGE_BUILD=true IMAGE_TAG=latest

  ci-success:
    runs-on: oci-runner # ubuntu-slim
    needs:
      [
        changes,
        build-images,
        unit-test,
        e2e-sequential,
        e2e-parallel,
        e2e-public-api,
        docker-smoke-test,
        ui-test,
        k8s-e2e,
      ]
    if: always()
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Install gh CLI
        run: |
          install_dependencies() {
            if ! command -v curl &> /dev/null; then
              echo "curl not found. Installing..."
              if command -v apt-get &> /dev/null; then
                sudo apt-get update && sudo apt-get install -y curl ca-certificates
              elif command -v apk &> /dev/null; then
                sudo apk add --no-cache curl ca-certificates
              elif command -v yum &> /dev/null; then
                sudo yum install -y curl ca-certificates
              elif command -v dnf &> /dev/null; then
                sudo dnf install -y curl ca-certificates
              else
                echo "Could not find package manager to install curl. Trying to proceed..."
              fi
            fi
          }

          if ! command -v gh &> /dev/null; then
            echo "gh not found. Installing..."
            install_dependencies

            GH_VERSION="2.65.0"
            ARCH=$(uname -m)
            case $ARCH in
              x86_64) ARCH_STR="amd64" ;;
              aarch64) ARCH_STR="arm64" ;;
              *) echo "Unsupported arch: $ARCH"; exit 1 ;;
            esac

            mkdir -p /tmp/gh-install
            URL="https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH_STR}.tar.gz"
            TARBALL="/tmp/gh-install/gh.tar.gz"

            if command -v curl &> /dev/null; then
              echo "Downloading with curl..."
              for i in {1..5}; do
                curl -fsSL --retry 5 --retry-connrefused --retry-max-time 60 "$URL" -o "$TARBALL" && break || {
                  echo "Curl attempt $i failed. Retrying in 10s..."
                  sleep 10
                }
              done
            elif command -v wget &> /dev/null; then
              echo "Downloading with wget..."
              for i in {1..5}; do
                wget -q "$URL" -O "$TARBALL" && break || {
                  echo "Wget attempt $i failed. Retrying in 10s..."
                  sleep 10
                }
              done
            else
              echo "Neither curl nor wget found. Cannot install gh."
              exit 1
            fi

            if [ ! -f "$TARBALL" ]; then
              echo "Failed to download gh after retries."
              exit 1
            fi

            tar xz -C /tmp/gh-install -f "$TARBALL"

            BIN_PATH="/tmp/gh-install/gh_${GH_VERSION}_linux_${ARCH_STR}/bin/gh"

            if [ -w /usr/local/bin ]; then
               cp "$BIN_PATH" /usr/local/bin/
            elif command -v sudo &> /dev/null; then
               sudo cp "$BIN_PATH" /usr/local/bin/
            else
               mkdir -p "$HOME/.local/bin"
               cp "$BIN_PATH" "$HOME/.local/bin/"
               echo "$HOME/.local/bin" >> $GITHUB_PATH
            fi

            rm -rf /tmp/gh-install
            echo "gh installed successfully."
          else
            echo "gh is already installed."
          fi

      - name: Auto-Squash
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}" || echo "Failed to enable auto-merge (check permissions/settings)"

      - name: Check Results and Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_JSON: ${{ toJson(needs) }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 1. Check for Failures
          # Parse needs JSON to find failures. Using simple grep/jq approach.
          # Since we might not have jq, we use python for reliable parsing.

          cat <<EOF > check_failures.py
          import os
          import json
          import sys

          needs_json = os.environ.get("NEEDS_JSON", "{}")
          try:
              needs = json.loads(needs_json)
          except Exception as e:
              print(f"Error parsing JSON: {e}")
              sys.exit(1)

          failed_jobs = [k for k, v in needs.items() if v.get("result") in ["failure", "cancelled"]]

          if not failed_jobs:
              print("All jobs passed.")
              sys.exit(0)

          print(f"Failed jobs: {','.join(failed_jobs)}")

          pr_number = os.environ.get("PR_NUMBER")
          if not pr_number:
              print("Not a PR, skipping comment.")
              sys.exit(1)

          # Construct comment body
          repo = os.environ.get("REPO")
          run_id = os.environ.get("RUN_ID")
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"

          list_items = [f"- **{job}: Failed**" for job in failed_jobs]
          list_str = "\\n".join(list_items)

          agent_prompt = f"""
          Please investigate the failures above.
          1. Check the [Action logs]({run_url}) for the specific error messages.
          2. Analyze the root cause.
          3. Apply fixes to the codebase.
          """

          body = f"""❌ **CI Checks Failed**

          The following GitHub Actions checks failed in this run:
          {list_str}

          ---
          {agent_prompt}
          """

          # Write body to file for gh cli
          with open("comment_body.md", "w") as f:
              f.write(body)

          sys.exit(1)
          EOF

          python3 check_failures.py
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Success."
            exit 0
          fi

          # If python script exited with 1 (failures found and PR present)
          if [ -f comment_body.md ]; then
             echo "Posting comment to PR #$PR_NUMBER..."
             gh issue comment "$PR_NUMBER" --body-file comment_body.md --repo "$REPO"
          fi

          echo "::error::Workflow failed due to job dependencies."
          exit 1
