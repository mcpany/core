  e2e-public-api:
    runs-on: oci-runner
    container:
      image: iowoi/mcp-runner:latest
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    timeout-minutes: 180
    needs: [changes, build-images]
    if: ${{ needs.changes.outputs.src == 'true' }}
    continue-on-error: true # Temporarily allow failure while stabilizing
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IPINFO_API_TOKEN: ${{ secrets.IPINFO_API_TOKEN }}
    steps:
      - name: Free Disk Space (Fast)
        run: |
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          $SUDO rm -rf /usr/local/lib/android
          $SUDO rm -rf /usr/share/dotnet
          $SUDO rm -rf /opt/ghc
          $SUDO rm -rf /usr/local/share/boost

      - name: Prune Docker
        run: docker system prune -af

      - uses: actions/checkout@v6

      - name: Install dependencies (Idempotent)
        run: |
          if command -v make >/dev/null && command -v curl >/dev/null; then
            echo "Dependencies already installed in container, skipping apt-get."
            exit 0
          fi
          if command -v sudo >/dev/null; then SUDO="sudo"; else SUDO=""; fi
          if command -v apt-get > /dev/null 2>&1; then
            $SUDO apt-get update && $SUDO apt-get install -y make xz-utils curl unzip build-essential
          elif command -v apk > /dev/null 2>&1; then
             $SUDO apk add --no-cache make xz curl unzip build-base
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt --break-system-packages

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: server/tests/integration/upstream/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Date
        id: get-date
        run: |
          echo "week=$(/bin/date -u "+%V")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect Architecture
        id: detect-arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) SLUG="amd64" ;;
            aarch64) SLUG="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: build/env/bin
          key: ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-${{ hashFiles('Makefile') }}-
            ${{ runner.os }}-build-env-bin-v3-${{ steps.get-date.outputs.week }}-

      # Intentionally omitting Docker downloads as e2e-public-api doesn't need them

      - name: Prepare environment
        run: make prepare

      - name: Debug Environment
        run: |
          docker info
          go env

      - name: test public api
        run: |
          make test-public-api SKIP_DOCKER_REBUILD=true CACHE_TO=type=gha,mode=max CACHE_FROM=type=gha COVERAGE_FILE=coverage-public-api.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage-public-api.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

