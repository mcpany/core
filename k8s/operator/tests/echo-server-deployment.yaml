apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-http-echo-server
  namespace: mcp-system
  labels:
    app: ui-http-echo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-http-echo-server
  template:
    metadata:
      labels:
        app: ui-http-echo-server
    spec:
      containers:
      - name: ui-http-echo-server
        image: mcpany/http-echo-server:latest
        imagePullPolicy: Never
        args:
        - "--port=5678"
        ports:
        - containerPort: 5678
