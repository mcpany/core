global_settings:
  allowed_origins:
    - "*"
  profile_definitions:
    - name: "default"
      selector:
        tags: ["dev"]
  db_path: "/tmp/mcpany_test_v2.db"
  debugger:
    enabled: true
  middlewares:
    - name: "auth"
      priority: 1
      disabled: true

upstream_services:
  - id: "test-service"
    name: "test-service"
    command_line_service:
      command: "echo"
      tools:
        - name: "get_complex_data"
          description: "Returns complex data for UI testing"
          call_id: "get_complex_data"
      calls:
        get_complex_data:
          args: ['[{"id": 1, "name": "Alice", "role": "Admin", "details": {"active": true}}, {"id": 2, "name": "Bob", "role": "User", "details": {"active": false}}]']
      resources:
        - uri: "system://logs"
          name: "System Logs"
          mime_type: "text/plain"
